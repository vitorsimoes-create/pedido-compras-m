function fmt(n){ return 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtData(iso){ return iso ? iso.split('-').reverse().join('/') : '—'; }
function hojeISO(){ return new Date().toISOString().slice(0,10); }
function classifica(vencISO, hoje, mais30){
  if(vencISO < hoje) return 'vencida';
  if(vencISO < mais30) return 'ate30';
  return 'futura';
}
function nomeCli(id){ return DADOS.clientes[id]||('Cliente '+id); }
let modoAtual='aberto';
function setModo(m){
  modoAtual=m;
  document.getElementById('modo-aberto').classList.toggle('ativo', m==='aberto');
  document.getElementById('modo-pago').classList.toggle('ativo', m==='pago');
  renderizar();
}
function renderBarras(porMes, comVencidas){
  const meses=Object.keys(porMes).filter(k=>k!=='Vencidas').sort();
  const tetoData=new Date(); tetoData.setMonth(tetoData.getMonth()+12);
  const teto=tetoData.toISOString().slice(0,7);
  const limite=meses.filter(k=>k<=teto).slice(0,13);
  const apos=meses.filter(k=>!limite.includes(k)).reduce((s,k)=>s+porMes[k],0);
  const barras=[];
  if(comVencidas && porMes['Vencidas']) barras.push(['Vencidas', porMes['Vencidas'], true]);
  limite.forEach(k=>{ const [a,m]=k.split('-'); barras.push([m+'/'+a.slice(2), porMes[k], false]); });
  if(apos>0) barras.push(['Após 12m', apos, false]);
  const max=Math.max(...barras.map(b=>b[1]), 1);
  document.getElementById('grafico-barras').innerHTML=barras.map(([lbl,val,isVenc])=>
    '<div class="gbar'+(isVenc?' vencida':'')+'"><div class="glabel">'+lbl+'</div>'+
    '<div class="gtrack"><div class="gfill" style="width:'+Math.max(2,Math.round(val/max*100))+'%"></div></div>'+
    '<div style="width:110px;flex-shrink:0;font-weight:bold;color:#444">'+fmt(val)+'</div></div>'
  ).join('');
}
function renderizar(){
  document.getElementById('gerado-em').textContent='Gerado em '+DADOS.geradoEm+' · banco mc_moto';
  const det=document.getElementById('detalhe');
  const nota=document.getElementById('nota-rodape');
  const hoje=hojeISO();
  const mais30=new Date(Date.now()+30*86400000).toISOString().slice(0,10);

  if(modoAtual==='aberto'){
    document.getElementById('titulo-grafico').textContent='Saldo a receber por mês de vencimento';
    const titulos=DADOS.abertos;
    let tot=0, venc=0, a30=0, fut=0;
    const porMes={};
    titulos.forEach(t=>{
      tot+=t.saldo;
      const cls=classifica(t.venc, hoje, mais30);
      if(cls==='vencida'){ venc+=t.saldo; porMes['Vencidas']=(porMes['Vencidas']||0)+t.saldo; }
      else{
        if(cls==='ate30') a30+=t.saldo; else fut+=t.saldo;
        porMes[t.venc.slice(0,7)]=(porMes[t.venc.slice(0,7)]||0)+t.saldo;
      }
    });
    document.getElementById('kpis').innerHTML=
      '<div class="card"><label>Total em aberto</label><div class="calc">'+fmt(tot)+'</div></div>'+
      '<div class="card vencida"><label>Vencidas</label><div class="calc">'+fmt(venc)+'</div></div>'+
      '<div class="card ate30"><label>Vencem em 30 dias</label><div class="calc">'+fmt(a30)+'</div></div>'+
      '<div class="card futura"><label>Futuras (&gt;30 dias)</label><div class="calc">'+fmt(fut)+'</div></div>';
    renderBarras(porMes, true);
    if(titulos.length===0){
      det.innerHTML='<div class="sem-dados">✅ Nenhum título a receber em aberto.</div>';
      nota.textContent='';
      return;
    }
    const linhas=titulos.slice().sort((a,b)=>a.venc<b.venc?-1:1);
    const rows=linhas.map(t=>{
      const cls=classifica(t.venc,hoje,mais30);
      return '<tr class="'+(cls==='vencida'?'vencida':'')+'">'+
        '<td>'+nomeCli(t.cli)+' <span style="color:#94a3b8;font-size:10px">(#'+t.cli+')</span></td>'+
        '<td>'+(t.doc||'—')+(t.nf?' / NF '+t.nf:'')+'</td>'+
        '<td>'+fmtData(t.emissao)+'</td>'+
        '<td>'+fmtData(t.venc)+'</td>'+
        '<td><span class="pill '+cls+'">'+(cls==='vencida'?'Vencida':cls==='ate30'?'≤ 30 dias':'Futura')+'</span></td>'+
        '<td><b>'+fmt(t.saldo)+'</b></td></tr>';
    }).join('');
    det.innerHTML='<div class="tabela-wrap"><table><thead><tr><th>Cliente</th><th>Documento</th><th>Emissão</th><th>Vencimento</th><th>Situação</th><th>Saldo</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    nota.textContent='Títulos em aberto (saldo líquido de recebimentos parciais), ordenados por vencimento. A classificação vencida/30 dias/futura é recalculada contra a data em que você está vendo a página; os valores refletem a última geração.';
  }else{
    document.getElementById('titulo-grafico').textContent='Valor recebido por mês (últimos 12 meses)';
    const tot=Object.values(DADOS.pagosMeses).reduce((s,v)=>s+v,0);
    const nTitulos=DADOS.pagosClientes.reduce((s,c)=>s+c[2],0);
    document.getElementById('kpis').innerHTML=
      '<div class="card pago"><label>Total recebido (12 meses)</label><div class="calc">'+fmt(tot)+'</div></div>'+
      '<div class="card"><label>Títulos recebidos</label><div class="calc">'+nTitulos.toLocaleString('pt-BR')+'</div></div>'+
      '<div class="card"><label>Clientes</label><div class="calc">'+DADOS.pagosClientes.length+'</div></div>';
    renderBarras(DADOS.pagosMeses, false);
    const rows=DADOS.pagosClientes.map(c=>'<tr>'+
      '<td>'+nomeCli(c[0])+' <span style="color:#94a3b8;font-size:10px">(#'+c[0]+')</span></td>'+
      '<td>'+c[2].toLocaleString('pt-BR')+'</td>'+
      '<td>'+fmtData(c[3])+'</td>'+
      '<td><b>'+fmt(c[1])+'</b></td></tr>').join('');
    det.innerHTML='<div class="tabela-wrap"><table><thead><tr><th>Cliente</th><th>Títulos recebidos</th><th>Último recebimento</th><th>Total recebido (12m)</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    nota.textContent='Títulos quitados (situação Q) com pagamento nos últimos 12 meses, agregados por cliente e ordenados por total recebido.';
  }
}
renderizar();
</script>
</body>
</html>
