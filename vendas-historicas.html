<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Vendas Históricas — MC MOTO</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; background:#f2f4f7; margin:0; padding:20px; color:#222; }
  h1 { background:#312e81; color:#fff; padding:14px 18px; border-radius:6px; font-size:18px; margin:0 0 6px; }
  .sub { font-size:12px; color:#666; margin-bottom:16px; }
  .barra-controles { display:flex; align-items:center; gap:10px; background:#fff; border-radius:8px; padding:10px 16px; box-shadow:0 1px 3px rgba(0,0,0,.12); margin-bottom:18px; font-size:13px; flex-wrap:wrap; }
  .barra-controles b { color:#312e81; margin-right:4px; }
  .per-btn { padding:6px 16px; border:1px solid #e2e8f0; border-radius:20px; background:#fff; cursor:pointer; font-size:12px; font-weight:bold; color:#64748b; }
  .per-btn.ativo { background:#312e81; border-color:#312e81; color:#fff; }
  .cards { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
  .card { background:#fff; border-radius:8px; padding:12px 16px; box-shadow:0 1px 3px rgba(0,0,0,.12); min-width:160px; flex:1; }
  .card label { display:block; font-size:11px; color:#666; margin-bottom:4px; }
  .card .calc { font-weight:bold; font-size:19px; color:#312e81; }
  .card .calc small { font-size:11px; color:#888; font-weight:normal; }
  .grafico { background:#fff; border-radius:8px; padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.12); margin-bottom:20px; }
  .grafico h2 { font-size:13px; margin:0 0 10px; color:#444; }
  .gbar { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:11px; }
  .gbar .glabel { width:64px; color:#666; text-align:right; flex-shrink:0; }
  .gbar .gtrack { flex:1; background:#f1f5f9; border-radius:3px; height:15px; }
  .gbar .gfill { height:100%; border-radius:3px; background:#4f46e5; min-width:2px; }
  .gbar.parcial .gfill { background:#a5b4fc; }
  .gbar .gval { width:112px; flex-shrink:0; font-weight:bold; color:#444; }
  .tabela-wrap { background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.12); overflow:auto; margin-bottom:24px; max-height:600px; }
  table { width:100%; border-collapse:collapse; background:#fff; font-size:12px; }
  th, td { padding:7px 10px; text-align:right; border-bottom:1px solid #eee; white-space:nowrap; }
  th { background:#312e81; color:#fff; font-size:10px; text-transform:uppercase; position:sticky; top:0; }
  td:first-child, th:first-child { text-align:left; }
  tr.parcial td { background:#eef2ff; }
  .tag-parcial { display:inline-block; font-size:9px; font-weight:bold; padding:1px 6px; border-radius:10px; background:#e0e7ff; color:#3730a3; margin-left:5px; }
  .pos { color:#0a7a25; font-weight:bold; }
  .neg { color:#c00000; font-weight:bold; }
  .footer-note { font-size:11px; color:#888; margin-top:6px; }
</style>
</head>
<body>

<div class="cards" id="kpis"></div>
<div class="grafico"><h2 id="titulo-grafico"></h2><div id="grafico-barras"></div></div>

as":260863.36,"mc":105056.55},{"ym":"2025-06","pedidos":2748,"itens":4740,"vendas":240837.54,"mc":95292.06},{"ym":"2025-07","pedidos":2874,"itens":5301,"vendas":264535.88,"mc":105430.6},{"ym":"2025-08","pedidos":3044,"itens":5512,"vendas":274761.73,"mc":105248.53},{"ym":"2025-09","pedidos":2807,"itens":5151,"vendas":238392.17,"mc":92117.4},{"ym":"2025-10","pedidos":2997,"itens":5592,"vendas":256082.38,"mc":98726.39},{"ym":"2025-11","pedidos":2558,"itens":4819,"vendas":231044.09,"mc":86952.6},{"ym":"2025-12","pedidos":2864,"itens":5230,"vendas":265182.81,"mc":101145.98},{"ym":"2026-01","pedidos":2754,"itens":5245,"vendas":251574.15,"mc":93667.43},{"ym":"2026-02","pedidos":2608,"itens":4821,"vendas":241112.67,"mc":90304.68},{"ym":"2026-03","pedidos":3112,"itens":5757,"vendas":262048.4,"mc":101418.43},{"ym":"2026-04","pedidos":3034,"itens":5978,"vendas":280127.17,"mc":106504.2},{"ym":"2026-05","pedidos":2901,"itens":5849,"vendas":265769.8,"mc":102949.86},{"ym":"2026-06","pedidos":2580,"itens":4874,"vendas":221747.63,"mc":87264.78},{"ym":"2026-07","pedidos":1723,"itens":3315,"vendas":152090.94,"mc":58385.43}],"geradoEm":"22/07/2026 08:07"};
const MESES_PT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function fmt(n){ return 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtCurto(n){ if(Math.abs(n)>=1000000) return 'R$ '+(n/1000000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'M'; if(Math.abs(n)>=1000) return 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})+'k'; return fmt(n); }
function rotuloMes(ym){ const [a,m]=ym.split('-'); return MESES_PT[parseInt(m,10)-1]+'/'+a.slice(2); }
function pct(n){ return (n>=0?'+':'')+n.toFixed(1)+'%'; }

const mesAtual = DADOS.meses.length ? DADOS.meses[DADOS.meses.length-1].ym : '';
const vendasPorYm = {}; DADOS.meses.forEach(m=>{ vendasPorYm[m.ym]=m.vendas; });
function ymAnoAnterior(ym){ const [a,m]=ym.split('-'); return (parseInt(a,10)-1)+'-'+m; }

let periodo = 12;
function setPeriodo(p){
  periodo=p;
  document.querySelectorAll('.per-btn').forEach(b=>b.classList.toggle('ativo', parseInt(b.dataset.per,10)===p));
  renderizar();
}

function renderizar(){
  document.getElementById('gerado-em').textContent='Gerado em '+DADOS.geradoEm+' · banco mc_moto · histórico de '+rotuloMes(DADOS.meses[0].ym)+' até '+rotuloMes(mesAtual);
  const todos=DADOS.meses;
  const sel = periodo>0 ? todos.slice(-periodo) : todos.slice();

  // KPIs
  const totVendas=sel.reduce((s,m)=>s+m.vendas,0);
  const totMc=sel.reduce((s,m)=>s+m.mc,0);
  const mcPctGeral=totVendas?totMc/totVendas*100:0;
  const mediaMensal=sel.length?totVendas/sel.length:0;
  const melhor=sel.reduce((a,b)=>b.vendas>a.vendas?b:a, sel[0]||{vendas:0,ym:''});
  document.getElementById('kpis').innerHTML=
    '<div class="card"><label>Total no período</label><div class="calc">'+fmt(totVendas)+'</div></div>'+
    '<div class="card"><label>Média mensal</label><div class="calc">'+fmt(mediaMensal)+'</div></div>'+
    '<div class="card"><label>Melhor mês</label><div class="calc">'+fmt(melhor.vendas)+' <small>'+(melhor.ym?rotuloMes(melhor.ym):'')+'</small></div></div>'+
    '<div class="card"><label>Margem (MC%) média</label><div class="calc">'+mcPctGeral.toFixed(1)+'%</div></div>';

  // grafico (ordem cronologica)
  const max=Math.max(...sel.map(m=>m.vendas), 1);
  document.getElementById('titulo-grafico').textContent='Vendas líquidas por mês';
  document.getElementById('grafico-barras').innerHTML=sel.map(m=>
    '<div class="gbar'+(m.ym===mesAtual?' parcial':'')+'"><div class="glabel">'+rotuloMes(m.ym)+'</div>'+
    '<div class="gtrack"><div class="gfill" style="width:'+Math.max(2,Math.round(m.vendas/max*100))+'%"></div></div>'+
    '<div class="gval">'+fmtCurto(m.vendas)+'</div></div>'
  ).join('');

  // tabela (mais recente primeiro)
  const rows=sel.slice().reverse().map(m=>{
    const mcPct=m.vendas?m.mc/m.vendas*100:0;
    const ticket=m.pedidos?m.vendas/m.pedidos:0;
    const anterior=vendasPorYm[ymAnoAnterior(m.ym)];
    let yoy='<td style="color:#cbd5e1" title="mês parcial ou sem base do ano anterior">—</td>';
    if(m.ym!==mesAtual && anterior!=null && anterior>0){
      const v=(m.vendas/anterior-1)*100;
      yoy='<td class="'+(v>=0?'pos':'neg')+'">'+pct(v)+'</td>';
    }
    return '<tr class="'+(m.ym===mesAtual?'parcial':'')+'">'+
      '<td><b>'+rotuloMes(m.ym)+'</b>'+(m.ym===mesAtual?'<span class="tag-parcial">mês parcial</span>':'')+'</td>'+
      '<td>'+m.pedidos.toLocaleString('pt-BR')+'</td>'+
      '<td>'+m.itens.toLocaleString('pt-BR')+'</td>'+
      '<td><b>'+fmt(m.vendas)+'</b></td>'+
      '<td>'+fmt(m.mc)+'</td>'+
      '<td>'+mcPct.toFixed(1)+'%</td>'+
      '<td>'+fmt(ticket)+'</td>'+
      yoy+
    '</tr>';
  }).join('');
  document.getElementById('tabela').innerHTML='<table><thead><tr><th>Mês</th><th>Pedidos</th><th>Itens</th><th>Vendas líq.</th><th>MC</th><th>MC%</th><th>Ticket médio</th><th>vs. ano ant.</th></tr></thead><tbody>'+rows+'</tbody></table>';

  document.getElementById('nota-rodape').textContent='Vendas líquidas = faturamento (VL_TOTAL) de vendas não canceladas menos devoluções, mesma definição do restante do Mapa de Vendas. "vs. ano ant." compara com o mesmo mês do ano anterior. O mês corrente é parcial (dados até a última atualização).';
}
setPeriodo(12);
</script>
</body>
</html>
