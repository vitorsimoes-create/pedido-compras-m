  .gbar .gtrack { flex:1; background:#f1f5f9; border-radius:4px; height:22px; position:relative; }
  .gbar .gfill { height:100%; border-radius:4px; min-width:2px; }
  .gbar .gval { width:150px; flex-shrink:0; color:#444; }
  .gbar .gval b { color:#1f2937; }
  .gbar .gval .gp { color:#6366f1; font-weight:bold; }
  table { width:100%; border-collapse:collapse; background:#fff; font-size:12px; }
  th, td { padding:8px 12px; text-align:right; border-bottom:1px solid #eee; white-space:nowrap; }
  th { background:#312e81; color:#fff; font-size:10px; text-transform:uppercase; cursor:default; }
  td:first-child, th:first-child { text-align:left; }
  tr.total-row td { background:#eef2ff; font-weight:bold; border-top:2px solid #c7d2fe; }
  tr.clic { cursor:pointer; }
  tr.clic:hover td { background:#f5f7ff; }
  .comissao { color:#059669; font-weight:bold; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:7px; vertical-align:-1px; }
  .tabela-wrap { background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.12); overflow:hidden; margin-bottom:24px; }

  .hidden { display:none; }
</style>
</head>

<h1>🏷️ Vendas por Grupo de Comissão — MC MOTO</h1>
<div class="sub" id="gerado-em"></div>
<div class="barra-controles">

// DADOS.linhas: [ym, faixaLbl, faixaSort, vendas, mc, qtd]
// DADOS.linhasVend: [ym, vendedor, faixaLbl, faixaSort, vendas, mc, qtd]
const CORES = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#64748b','#14b8a6'];

function fmt(n){ return 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function rotuloMes(ym){ const [a,m]=ym.split('-'); const M=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']; return M[parseInt(m,10)-1]+'/'+a.slice(2); }
// aliquota da faixa (sort): >=0 é a % de comissão; -1 (Sem comissão) => 0
function aliq(sort){ return sort>=0 ? sort : 0; }
function comissaoDe(sort, vendas){ return vendas*aliq(sort)/100; }

const meses = [...new Set(DADOS.linhasVend.map(l=>l[0]))].sort();
const mesMin=meses[0], mesMax=meses[meses.length-1];

let periodo = 12;
let mesSel = null;   // quando setado (ex '2026-07'), filtra apenas aquele mês
let visao = 'faixa';
let vendSel = '__ALL__';

// popula o seletor de mês (mais recente primeiro)
(function(){
  const sel=document.getElementById('sel-mes');
  meses.slice().reverse().forEach(ym=>{
    const o=document.createElement('option'); o.value=ym; o.textContent=rotuloMes(ym)+(ym===mesMax?' (vigente)':''); sel.appendChild(o);
  });
})();

function marcarControles(){
  document.querySelectorAll('.per-btn[data-per]').forEach(b=>b.classList.toggle('ativo', !mesSel && parseInt(b.dataset.per,10)===periodo));
  document.getElementById('btn-mesatual').classList.toggle('ativo', mesSel===mesMax);
  document.getElementById('sel-mes').value = mesSel || '';
}
function setPeriodo(p){ periodo=p; mesSel=null; marcarControles(); render(); }
function setMesAtual(){ mesSel=mesMax; marcarControles(); render(); }
function setMes(ym){ mesSel = ym || null; marcarControles(); render(); }
function setVisao(v){
  visao=v;
  document.querySelectorAll('.vis-btn').forEach(b=>b.classList.toggle('ativo', b.dataset.vis===v));
  render();
}
function setVendedor(v){ vendSel=v; renderVendedor(); }

function cutoff(p){
  if(p<=0) return '0000-00';
  const d=new Date(mesMax+'-01T00:00:00'); d.setMonth(d.getMonth()-(p-1));
  return d.toISOString().slice(0,7);
}
// true se o mês (ym) está na janela ativa (mês único selecionado, ou o período em meses)
function noPeriodo(ym){ return mesSel ? (ym===mesSel) : (ym>=cutoff(periodo)); }
function rotuloPeriodo(){ return mesSel ? rotuloMes(mesSel) : (periodo>0 ? ('últimos '+periodo+' meses') : ('todo o histórico ('+meses.length+' meses)')); }

function render(){
  document.getElementById('gerado-em').textContent='Gerado em '+DADOS.geradoEm+' · banco mc_moto · histórico de '+rotuloMes(mesMin)+' até '+rotuloMes(mesMax);
  const faixaMode = visao==='faixa';
  document.getElementById('secao-faixa').classList.toggle('hidden', !faixaMode);
  document.getElementById('secao-vendedor').classList.toggle('hidden', faixaMode);
  if(faixaMode) renderFaixa(); else renderVendedor();
  document.getElementById('nota-rodape').innerHTML = faixaMode
    ? 'Vendas líquidas de devoluções/estornos, agrupadas pela faixa de comissão à vista do produto (produtos.COMISSAO_AVISTA). "Part. %" é a participação de cada faixa no total do período.'
    : '<b>Comissão a receber = vendas líquidas da faixa × alíquota da faixa</b> (a alíquota é a própria faixa de comissão à vista do produto, produtos.COMISSAO_AVISTA; "Sem comissão" = 0%). '
      + 'Vendas líquidas de devoluções/estornos. Vendedor vem de vendas.VENDEDOR; "SEM VENDEDOR" agrupa vendas de balcão sem vendedor individual.';
}

/* ---------- VISAO POR FAIXA ---------- */
function renderFaixa(){
  const rows=DADOS.linhas.filter(l=>noPeriodo(l[0]));
  const grupos={};
  rows.forEach(([ym,lbl,sort,vendas,mc,qtd])=>{
    const g=grupos[lbl]=grupos[lbl]||{lbl,sort,vendas:0,mc:0,qtd:0};
    g.vendas+=vendas; g.mc+=mc; g.qtd+=qtd;
  });
  const lista=Object.values(grupos).sort((a,b)=>b.vendas-a.vendas);
  const totVendas=lista.reduce((s,g)=>s+g.vendas,0);
  const totMc=lista.reduce((s,g)=>s+g.mc,0);
  const totQtd=lista.reduce((s,g)=>s+g.qtd,0);
  const totComissao=lista.reduce((s,g)=>s+comissaoDe(g.sort,g.vendas),0);
  const cor={}; lista.forEach((g,i)=>cor[g.lbl]=CORES[i%CORES.length]);

  const maior=lista[0]||{lbl:'—',vendas:0};
  document.getElementById('kpis').innerHTML=
    '<div class="card"><label>Total no período</label><div class="calc">'+fmt(totVendas)+' <small>'+rotuloPeriodo()+'</small></div></div>'+
    '<div class="card"><label>Maior faixa</label><div class="calc">'+maior.lbl+' <small>'+(totVendas?(maior.vendas/totVendas*100).toFixed(1):0)+'% do total</small></div></div>'+
    '<div class="card"><label>Margem (MC%) média</label><div class="calc">'+(totVendas?(totMc/totVendas*100).toFixed(1):0)+'%</div></div>'+
    '<div class="card destaque"><label>Comissão total (todas as faixas)</label><div class="calc">'+fmt(totComissao)+'</div></div>';

  document.getElementById('titulo-grafico').textContent='Vendas líquidas por grupo de comissão';
  const max=Math.max(...lista.map(g=>g.vendas),1);
  document.getElementById('grafico-barras').innerHTML=lista.map(g=>{
    const p=totVendas?g.vendas/totVendas*100:0;
    return '<div class="gbar"><div class="glabel">'+g.lbl+'</div>'+
      '<div class="gtrack"><div class="gfill" style="width:'+Math.max(2,Math.round(g.vendas/max*100))+'%;background:'+cor[g.lbl]+'"></div></div>'+
      '<div class="gval"><b>'+fmt(g.vendas)+'</b> <span class="gp">('+p.toFixed(1)+'%)</span></div></div>';
  }).join('');

  const body=lista.map(g=>{
    const p=totVendas?g.vendas/totVendas*100:0;
    const mcp=g.vendas?g.mc/g.vendas*100:0;
    return '<tr>'+
      '<td><span class="swatch" style="background:'+cor[g.lbl]+'"></span>'+g.lbl+'</td>'+
      '<td><b>'+fmt(g.vendas)+'</b></td>'+
      '<td>'+p.toFixed(1)+'%</td>'+
      '<td>'+fmt(g.mc)+'</td>'+
      '<td>'+mcp.toFixed(1)+'%</td>'+
      '<td>'+g.qtd.toLocaleString('pt-BR')+'</td>'+
      '<td class="comissao">'+fmt(comissaoDe(g.sort,g.vendas))+'</td></tr>';
  }).join('');
  const totMcp=totVendas?totMc/totVendas*100:0;
  const totalRow='<tr class="total-row"><td>TOTAL</td><td>'+fmt(totVendas)+'</td><td>100%</td><td>'+fmt(totMc)+'</td><td>'+totMcp.toFixed(1)+'%</td><td>'+totQtd.toLocaleString('pt-BR')+'</td><td class="comissao">'+fmt(totComissao)+'</td></tr>';
  document.getElementById('tabela').innerHTML='<table><thead><tr><th>Grupo de comissão</th><th>Vendas líq.</th><th>Part. %</th><th>MC</th><th>MC%</th><th>Qtd itens</th><th>Comissão</th></tr></thead><tbody>'+body+totalRow+'</tbody></table>';
}

/* ---------- VISAO POR VENDEDOR ---------- */
function renderVendedor(){
  const rows=DADOS.linhasVend.filter(l=>noPeriodo(l[0]));

  // total de comissao por vendedor (para ordenar o seletor e o resumo)
  const vend={};
  rows.forEach(([ym,vd,lbl,sort,vendas,mc,qtd])=>{
    const o=vend[vd]=vend[vd]||{vd,vendas:0,mc:0,qtd:0,comissao:0};
    o.vendas+=vendas; o.mc+=mc; o.qtd+=qtd; o.comissao+=comissaoDe(sort,vendas);
  });
  const vendedores=Object.values(vend).sort((a,b)=>b.comissao-a.comissao);

  // popular o seletor mantendo a selecao se ainda existir
  const sel=document.getElementById('sel-vend');
  const atual=vendSel;
  let opts='<option value="__ALL__">— Todos os vendedores (resumo) —</option>';
  vendedores.forEach(v=>{ opts+='<option value="'+v.vd.replace(/"/g,'&quot;')+'">'+v.vd+'</option>'; });
  sel.innerHTML=opts;
  if(atual!=='__ALL__' && !vendedores.some(v=>v.vd===atual)) vendSel='__ALL__';
  sel.value=vendSel;

  if(vendSel==='__ALL__') renderResumoVendedores(vendedores);
  else renderDetalheVendedor(rows.filter(l=>l[1]===vendSel), vendSel);
}

function renderResumoVendedores(vendedores){
  const totVendas=vendedores.reduce((s,v)=>s+v.vendas,0);
  const totComissao=vendedores.reduce((s,v)=>s+v.comissao,0);
  const maior=vendedores[0]||{vd:'—',comissao:0};
  document.getElementById('vend-kpis').innerHTML=
    '<div class="card"><label>Vendas líq. no período</label><div class="calc">'+fmt(totVendas)+' <small>'+rotuloPeriodo()+'</small></div></div>'+
    '<div class="card"><label>Vendedores</label><div class="calc">'+vendedores.length+'</div></div>'+
    '<div class="card"><label>Maior comissão</label><div class="calc">'+maior.vd+' <small>'+fmt(maior.comissao)+'</small></div></div>'+
    '<div class="card destaque"><label>Comissão total a pagar</label><div class="calc">'+fmt(totComissao)+'</div></div>';

  const body=vendedores.map(v=>{
    const efet=v.vendas?v.comissao/v.vendas*100:0;
    return '<tr class="clic" onclick="setVendedorSel(\''+v.vd.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+
      '<td>'+v.vd+'</td>'+
      '<td><b>'+fmt(v.vendas)+'</b></td>'+
      '<td>'+v.qtd.toLocaleString('pt-BR')+'</td>'+
      '<td>'+efet.toFixed(2)+'%</td>'+
      '<td class="comissao">'+fmt(v.comissao)+'</td></tr>';
  }).join('');
  const efetTot=totVendas?totComissao/totVendas*100:0;
  const totalRow='<tr class="total-row"><td>TOTAL</td><td>'+fmt(totVendas)+'</td><td></td><td>'+efetTot.toFixed(2)+'%</td><td class="comissao">'+fmt(totComissao)+'</td></tr>';
  document.getElementById('vend-tabela').innerHTML=
    '<table><thead><tr><th>Vendedor</th><th>Vendas líq.</th><th>Qtd itens</th><th>Alíquota efetiva</th><th>Comissão a receber</th></tr></thead><tbody>'+body+totalRow+'</tbody></table>'+
    '<div style="font-size:11px;color:#94a3b8;padding:8px 12px">Clique em um vendedor para ver o detalhamento por faixa.</div>';
}

function renderDetalheVendedor(rows, nome){
  const faixas={};
  rows.forEach(([ym,vd,lbl,sort,vendas,mc,qtd])=>{
    const f=faixas[lbl]=faixas[lbl]||{lbl,sort,vendas:0,mc:0,qtd:0};
    f.vendas+=vendas; f.mc+=mc; f.qtd+=qtd;
  });
  const lista=Object.values(faixas).sort((a,b)=>b.sort-a.sort);
  const totVendas=lista.reduce((s,f)=>s+f.vendas,0);
  const totQtd=lista.reduce((s,f)=>s+f.qtd,0);
  const totComissao=lista.reduce((s,f)=>s+comissaoDe(f.sort,f.vendas),0);
  const efet=totVendas?totComissao/totVendas*100:0;

  document.getElementById('vend-kpis').innerHTML=
    '<div class="card"><label>Vendedor</label><div class="calc" style="font-size:15px">'+nome+'</div></div>'+
    '<div class="card"><label>Vendas líq. no período</label><div class="calc">'+fmt(totVendas)+' <small>'+rotuloPeriodo()+'</small></div></div>'+
    '<div class="card"><label>Alíquota efetiva</label><div class="calc">'+efet.toFixed(2)+'%</div></div>'+
    '<div class="card destaque"><label>Comissão a receber</label><div class="calc">'+fmt(totComissao)+'</div></div>';

  const body=lista.map(f=>{
    const p=totVendas?f.vendas/totVendas*100:0;
    return '<tr>'+
      '<td>'+f.lbl+'</td>'+
      '<td><b>'+fmt(f.vendas)+'</b></td>'+
      '<td>'+p.toFixed(1)+'%</td>'+
      '<td>'+f.qtd.toLocaleString('pt-BR')+'</td>'+
      '<td>'+(f.sort>=0?aliq(f.sort).toLocaleString('pt-BR')+'%':'—')+'</td>'+
      '<td class="comissao">'+fmt(comissaoDe(f.sort,f.vendas))+'</td></tr>';
  }).join('');
  const totalRow='<tr class="total-row"><td>TOTAL</td><td>'+fmt(totVendas)+'</td><td>100%</td><td>'+totQtd.toLocaleString('pt-BR')+'</td><td>'+efet.toFixed(2)+'%</td><td class="comissao">'+fmt(totComissao)+'</td></tr>';
  document.getElementById('vend-tabela').innerHTML=
    '<table><thead><tr><th>Faixa de comissão</th><th>Vendas líq.</th><th>Part. %</th><th>Qtd itens</th><th>Alíquota</th><th>Comissão</th></tr></thead><tbody>'+body+totalRow+'</tbody></table>';
}

function setVendedorSel(nome){ document.getElementById('sel-vend').value=nome; setVendedor(nome); }

setPeriodo(12);
setVisao('faixa');
</script>
