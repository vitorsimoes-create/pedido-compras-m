}
function montaFiltro(){
  const div=document.getElementById('filtro-unidades');
  DADOS.unidades.forEach(u=>{
    const label=document.createElement('label');
    label.innerHTML='<input type="checkbox" class="filtro-unidade" value="'+u+'" checked> Unidade '+u;
    div.appendChild(label);
  });
  div.addEventListener('change', renderizar);
}
function renderKpisAging(titulos, hoje, mais30){
  let tot=0, venc=0, a30=0, fut=0;
  const porMes={};
  titulos.forEach(t=>{
    tot+=t.saldo;
    const cls=classifica(t.venc, hoje, mais30);
    if(cls==='vencida'){ venc+=t.saldo; porMes['Vencidas']=(porMes['Vencidas']||0)+t.saldo; }
    else{
      if(cls==='ate30') a30+=t.saldo; else fut+=t.saldo;
      const mk=t.venc.slice(0,7);
      porMes[mk]=(porMes[mk]||0)+t.saldo;
    }
  });
  document.getElementById('kpis').innerHTML=
    '<div class="card"><label>Total em aberto</label><div class="calc">'+fmt(tot)+'</div></div>'+
    '<div class="card vencida"><label>Vencidas</label><div class="calc">'+fmt(venc)+'</div></div>'+
    '<div class="card ate30"><label>Vencem em 30 dias</label><div class="calc">'+fmt(a30)+'</div></div>'+
    '<div class="card futura"><label>Futuras (&gt;30 dias)</label><div class="calc">'+fmt(fut)+'</div></div>';
  renderBarras(porMes, true);
}
function renderKpisPago(titulos, rotuloEntidade){
  const tot=titulos.reduce((s,t)=>s+t.valor,0);
  const entidades=new Set(titulos.map(t=>t.ent)).size;
  const porMes={};
  titulos.forEach(t=>{ const mk=t.data.slice(0,7); porMes[mk]=(porMes[mk]||0)+t.valor; });
  document.getElementById('kpis').innerHTML=
    '<div class="card pago"><label>Total quitado (12 meses)</label><div class="calc">'+fmt(tot)+'</div></div>'+
    '<div class="card"><label>Títulos quitados</label><div class="calc">'+titulos.length.toLocaleString('pt-BR')+'</div></div>'+
    '<div class="card"><label>'+rotuloEntidade+'</label><div class="calc">'+entidades+'</div></div>';
  renderBarras(porMes, false);
}
function renderBarras(porMes, comVencidas){
  const meses=Object.keys(porMes).filter(k=>k!=='Vencidas').sort();
  const tetoData=new Date(); tetoData.setMonth(tetoData.getMonth()+12);
  const teto=tetoData.toISOString().slice(0,7);
  const limite=meses.filter(k=>k<=teto).slice(0,13);
  const apos=meses.filter(k=>!limite.includes(k)).reduce((s,k)=>s+porMes[k],0);
  const barras=[];
  if(comVencidas && porMes['Vencidas']) barras.push(['Vencidas', porMes['Vencidas'], true]);
  limite.forEach(k=>{ const [a,m]=k.split('-'); barras.push([m+'/'+a.slice(2), porMes[k], false]); });
  if(apos>0) barras.push(['Após 12m', apos, false]);
  const max=Math.max(...barras.map(b=>b[1]), 1);
  document.getElementById('grafico-barras').innerHTML=barras.map(([lbl,val,isVenc])=>
    '<div class="gbar'+(isVenc?' vencida':'')+'"><div class="glabel">'+lbl+'</div>'+
    '<div class="gtrack"><div class="gfill" style="width:'+Math.max(2,Math.round(val/max*100))+'%"></div></div>'+
    '<div class="gval">'+fmt(val)+'</div></div>'
  ).join('');
}

function renderizar(){
  const uns=unidadesSelecionadas();
  document.getElementById('gerado-em').textContent='Gerado em '+DADOS.geradoEm+' · Unidade(s): '+(uns.length?uns.join(', '):'(nenhuma selecionada)');
  const det=document.getElementById('detalhe');
  const nota=document.getElementById('nota-rodape');
  if(uns.length===0){ document.getElementById('kpis').innerHTML=''; document.getElementById('grafico-barras').innerHTML=''; det.innerHTML='<div class="sem-dados">Selecione ao menos uma unidade de negócio.</div>'; nota.textContent=''; return; }
  const hoje=hojeISO();
  const mais30=new Date(Date.now()+30*86400000).toISOString().slice(0,10);

  if(modoAtual==='aberto'){
    document.getElementById('titulo-grafico').textContent='Saldo a pagar por mês de vencimento';
    const titulos=DADOS.abertos.filter(t=>uns.includes(t.u));
    renderKpisAging(titulos, hoje, mais30);
    const porMes={};
    titulos.forEach(t=>{ const mk=t.venc.slice(0,7); (porMes[mk]=porMes[mk]||[]).push(t); });
    const mesAtual=hoje.slice(0,7);
    det.innerHTML=Object.keys(porMes).sort().map(mk=>{
      const itens=porMes[mk].slice().sort((a,b)=>a.venc<b.venc?-1:1);
      const total=itens.reduce((s,t)=>s+t.saldo,0);
      const temVencido=itens.some(t=>t.venc<hoje);
      const aberto=temVencido||mk===mesAtual;
      const [a,m]=mk.split('-');
      const rows=itens.map(t=>{
        const cls=classifica(t.venc,hoje,mais30);
        return '<tr class="'+(cls==='vencida'?'vencida':'')+'">'+
          '<td>'+nomeForn(t.ent)+'</td><td>'+t.u+'</td>'+
          '<td>'+fmtData(t.emissao)+'</td><td>'+fmtData(t.venc)+'</td>'+
          '<td><span class="pill '+cls+'">'+(cls==='vencida'?'Vencida':cls==='ate30'?'≤ 30 dias':'Futura')+'</span></td>'+
          '<td><b>'+fmt(t.saldo)+'</b></td></tr>';
      }).join('');
      return '<details'+(aberto?' open':'')+(temVencido?' class="vencido"':'')+'>'+
        '<summary><span>'+m+'/'+a+' · '+itens.length+' título(s)</span><span>'+fmt(total)+'</span></summary>'+
        '<div class="det-body"><table><thead><tr><th>Fornecedor</th><th>Un.</th><th>Emissão</th><th>Vencimento</th><th>Situação</th><th>Saldo</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
        '</details>';
    }).join('');
    nota.textContent='Títulos em aberto (saldo líquido de pagamentos parciais). A classificação vencida/30 dias/futura é recalculada contra a data em que você está vendo a página; os valores refletem a última geração.';
  }else{
    document.getElementById('titulo-grafico').textContent='Valor pago por mês de pagamento (últimos 12 meses)';
    const titulos=DADOS.pagos.filter(t=>uns.includes(t.u));
    renderKpisPago(titulos, 'Fornecedores');
    const porForn={};
    titulos.forEach(t=>{
      const f=porForn[t.ent]=porForn[t.ent]||{ent:t.ent,tot:0,n:0,ultimo:''};
      f.tot+=t.valor; f.n++;
      if(t.data>f.ultimo) f.ultimo=t.data;
    });
    const linhas=Object.values(porForn).sort((a,b)=>b.tot-a.tot);
    const rows=linhas.map(f=>'<tr>'+
      '<td>'+nomeForn(f.ent)+'</td><td>'+f.n+'</td><td>'+fmtData(f.ultimo)+'</td><td><b>'+fmt(f.tot)+'</b></td></tr>').join('');
    det.innerHTML='<div class="tabela-wrap"><table><thead><tr><th>Fornecedor</th><th>Títulos pagos</th><th>Último pagamento</th><th>Total pago (12m)</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    nota.textContent='Títulos quitados (situação LQ) com pagamento nos últimos 12 meses, deduplicados por título — a tabela-espelho do ERP contém linhas repetidas que são descartadas na geração. Ordenado por total pago.';
  }
}

montaFiltro();
renderizar();
</script>
